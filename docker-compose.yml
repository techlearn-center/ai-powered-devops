version: "3.9"

services:
  # ── AI-Powered DevOps Application ──────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-devops-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - PROMETHEUS_PUSHGATEWAY_URL=http://prometheus:9090
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-devops-net

  # ── Elasticsearch (Log Storage & Search) ───────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: ai-devops-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ai-devops-net

  # ── Prometheus (Metrics Collection) ────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: ai-devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - ai-devops-net

  # ── Grafana (Visualization & Dashboards) ───────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: ai-devops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ai-devops-net

volumes:
  es-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  ai-devops-net:
    driver: bridge
